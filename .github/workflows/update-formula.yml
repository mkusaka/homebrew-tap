name: Update Formula

on:
  repository_dispatch:
    types: [update-formula]

jobs:
  update:
    name: Update Formula
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: true

      - name: Resolve formula path
        env:
          FORMULA_NAME: ${{ github.event.client_payload.formula || 'ccost' }}
        run: |
          echo "FORMULA_NAME=$FORMULA_NAME" >> "$GITHUB_ENV"
          echo "FORMULA_PATH=Formula/${FORMULA_NAME}.rb" >> "$GITHUB_ENV"
          if [[ ! -f "Formula/${FORMULA_NAME}.rb" ]]; then
            echo "::error::Missing formula file Formula/${FORMULA_NAME}.rb"
            exit 1
          fi

      - name: Update formula
        env:
          FORMULA_VERSION: ${{ github.event.client_payload.version }}
          FORMULA_SOURCE_SHA256: ${{ github.event.client_payload.source_sha256 }}
          FORMULA_ARM64_SEQUOIA_SHA256: ${{ github.event.client_payload.arm64_sequoia_sha256 }}
          FORMULA_SEQUOIA_SHA256: ${{ github.event.client_payload.sequoia_sha256 }}
        run: |
          ruby <<'RUBY'
          path = ENV.fetch("FORMULA_PATH")
          text = File.read(path)

          text.sub!(/^  url ".*"$/, %(  url "https://github.com/mkusaka/ccost/archive/refs/tags/v#{ENV.fetch("FORMULA_VERSION")}.tar.gz"))
          text.sub!(/^  version ".*"$/, %(  version "#{ENV.fetch("FORMULA_VERSION")}"))
          text.sub!(/^  sha256 "[0-9a-f]{64}"$/, %(  sha256 "#{ENV.fetch("FORMULA_SOURCE_SHA256")}"))
          text.sub!(/^    root_url ".*"$/, %(    root_url "https://github.com/mkusaka/ccost/releases/download/v#{ENV.fetch("FORMULA_VERSION")}"))
          text.sub!(/^    sha256 arm64_sequoia: ".*"$/, %(    sha256 arm64_sequoia: "#{ENV.fetch("FORMULA_ARM64_SEQUOIA_SHA256")}"))
          text.sub!(/^    sha256 sequoia: ".*"$/, %(    sha256 sequoia: "#{ENV.fetch("FORMULA_SEQUOIA_SHA256")}"))

          File.write(path, text)
          RUBY

          cat "$FORMULA_PATH"

      - name: Commit and push
        env:
          FORMULA_VERSION: ${{ github.event.client_payload.version }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "$FORMULA_PATH"
          git diff --cached --quiet && echo "No changes" && exit 0
          git commit -m "bump ${FORMULA_NAME} to ${FORMULA_VERSION}"
          git push
